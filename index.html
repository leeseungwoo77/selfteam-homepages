<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>셀프팀 홈페이지 | 로그인</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="assets/logo.jpg" alt="Sangsangplex">
      <span>셀프팀 홈페이지</span>
    </div>
    <p class="auth-sub">팀 일정·일지·자료를 한 곳에서 관리합니다</p>

    <div class="tabs">
      <button class="tab-btn active" id="tabLogin">로그인</button>
      <button class="tab-btn" id="tabSignup">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <form id="loginForm">
      <div class="field">
        <label>이메일</label>
        <input type="email" id="loginEmail" required>
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="loginPassword" required>
      </div>
      <button class="btn" type="submit">로그인</button>
      <p class="error-msg" id="loginError"></p>
    </form>

    <!-- 회원가입 폼 -->
    <form id="signupForm" style="display:none;">
      <div class="field">
        <label>이름</label>
        <input type="text" id="suName" required>
      </div>
      <div class="field">
        <label>담당 지점</label>
        <select id="suBranch" required>
          <option value="">불러오는 중...</option>
        </select>
      </div>
      <div class="field">
        <label>이메일</label>
        <input type="email" id="suEmail" required>
      </div>
      <div class="field">
        <label>비밀번호 (6자 이상)</label>
        <input type="password" id="suPassword" required minlength="6">
      </div>
      <button class="btn" type="submit">회원가입</button>
      <p class="error-msg" id="signupError"></p>
    </form>

    <p class="hint">문제가 있나요? 팀장에게 계정 확인을 요청하세요.</p>
  </div>
</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
